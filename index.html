<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>VaiPra Engenharia</title>
</head>
<body>
    <nav class="navbar">
        <div class="brand">
            <div class="logo-v">V</div>
            <span class="brand-name">VaiPra Engenharia</span>
        </div>

        <ul class="nav-links">
            <li><a href="#inicio">Início</a></li>
            <li><a href="#catalogo">Catálogo</a></li>
            <li><a href="#contato">Contato</a></li>
        </ul>
        
    </nav>


    <section id="inicio" class="banner">
        <div class="carousel-container">
            <div class="carousel-slide">
                <img src="./img/kinect.webp" alt="Banner 1">
                <img src="./img/residentevil.jpg" alt="Banner 2">
                <img src="./img/oitogramasdeproteina.jpg" alt="Banner 3">
            </div>

            <button id="previous" class="carousel-btn prev">&#10094;</button>
            <button id="next" class="carousel-btn next">&#10095;</button>

            <div class="carousel-dots">
                <span class="dot active" onclick="currentSlide(0)"></span>
                <span class="dot" onclick="currentSlide(1)"></span>
                <span class="dot" onclick="currentSlide(2)"></span>
            </div>
        </div>
    </section>



    <section id="catalogo" class="catalogo">
        <h2 class="title-catalog">ENGENHEIRO, CONFIRA OS PRODUTOS!</h2>

        <div class="produtos-container">

        <button class="btn-product" onclick="window.location.href='pages/produto1/produto1.html'">
            <div class="card-simples">
                <img src="./img/kinect.webp" alt="Produto 1">
                <h3>O Xbox Kinect vai ter Ondas Cerebrais</h3>
                <p>Isso mesmo, o Xbox Kinect vai receber uma nova atualização que permitirá o controle por meio de ondas cerebrais.</p>
            </div>
        </button>

        <button class="btn-product" onclick="window.location.href='pages/produto2/produto2.html'">
            <div class="card-simples">
                <img src="./img/residentevil.jpg" alt="Produto 2">
                <h3>Resident Evil 4 Remake</h3>
                <p>Inacreditável, vai lançar o mais novo remake da série.</p>
            </div>
        </button>

        <div class="card-simples">
            <button class="btn-product" onclick="window.location.href='pages/produto3/produto3.html'">
            <img src="./img/oitogramasdeproteina.jpg" alt="Produto 3">
            <h3>Monster de café</h3>
            <p>Novo produto de café com oito gramas de proteína.</p>
            </button>
        </div>

        </div>
    </section>



    <section id="contato" class="contato">
    <h2>Entre em Contato</h2>
    <p>Fale conosco pelo WhatsApp!</p>

    <a 
        href="https://wa.me/5549999359097?text=Olá!%20Vim%20pelo%20site%20e%20gostaria%20de%20saber%20mais%20sobre%20os%20produtos." 
        target="_blank" 
        class="btn-whatsapp"
    >
        <img src="./img/svg/WhatsApp.svg.webp" alt="Ícone do WhatsApp" class="whatsapp-icon">
        Falar no WhatsApp
    </a>
    </section>

    <footer class="footer">
        <p>&copy; 2026 VaiPra Engenharia. Todos os direitos reservados.</p>
    </footer>
        
    <script src="/js/script.js"></script>

</body>
</html>
