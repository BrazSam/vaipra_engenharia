<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>VaiPra Engenharia</title>
</head>
<body>
    <nav class="navbar">
        <div class="brand">
            <div class="logo-v">V</div>
            <span class="brand-name">VaiPra Engenharia</span>
        </div>

        <ul class="nav-links">
            <li><a href="#inicio">Início</a></li>
            <li><a href="#catalogo">Catálogo</a></li>
            <li><a href="#contato">Contato</a></li>
        </ul>
    </nav>

    <div class="carousel-container">
        <div class="carousel-slide">
            <img src="./img/_image.webp" alt="Banner 1">
            <img src="./img/hq720.jpg" alt="Banner 2">
            <img src="./img/oitogramasdeproteina.jpg" alt="Banner 3">
        </div>

        <button id="previous" class="carousel-btn prev">&#10094;</button>
        <button id="next" class="carousel-btn next">&#10095;</button>

        <div class="carousel-dots">
            <span class="dot active" onclick="currentSlide(0)"></span>
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
